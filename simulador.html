<!doctype html>
<html>
  <head>
    <title>GitHub Copilot Practice Exam</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>GitHub Copilot Practice Exam</h1>
      </div>

      <div class="content-wrapper">
        <button onclick="toggleSidebar()" class="toggle-sidebar">☰</button>
        <div class="sidebar" id="sidebar"></div>

        <div class="main-content">
          <div class="panel">
            <div class="question-header">
              <div class="question-title" id="questionTitle"></div>
            </div>
            <h3 id="questionNumber">Options</h3>
            <br />
            <div class="options-container" id="optionsContainer"></div>

            <div class="correct-answers" id="correctAnswers"></div>
            <div class="explanation" id="explanation"></div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 20px;
              "
            >
              <div class="question-counter" id="counter"></div>
              <div style="display: flex; gap: 15px">
                <button
                  onclick="previousQuestion()"
                  class="icon-button"
                  id="prevBtn"
                >
                  ←
                </button>
                <button
                  onclick="nextQuestion()"
                  class="icon-button"
                  id="nextBtn"
                >
                  →
                </button>
              </div>
            </div>
            <div class="answer-status" id="answerStatus"></div>
          </div>
          <div class="panel">
            <div class="controls">
              <div class="left-controls">
                <button onclick="showAnswer()" class="btn-show-answer">
                  👁️ Show Answer
                </button>
                <button onclick="clearSelection()" class="btn-clear">
                  ✕ Clear
                </button>
                <button onclick="submitQuiz()" class="btn-submit">
                  ✓ Submit Exam
                </button>
                <button onclick="generatePDF()" class="btn-pdf">
                  📄 Generate PDF
                </button>
              </div>
            </div>
          </div>

          <div class="result-container" id="resultContainer">
            <h3 id="resultScore"></h3>
          </div>
        </div>
      </div>
    </div>

    <script src="./simulator.js"></script>
  </body>
</html>
